name: CI/CD – Week3 (Frontend + Backend + DB)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-and-push:
    runs-on: self-hosted

    steps:
      # 1️⃣ Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Log in to GitHub Container Registry
      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN}}

      # 3️⃣ Build & push backend image
      - name: Build & push backend Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/week3-backend:latest ./backend
          docker push ghcr.io/${{ github.repository_owner }}/week3-backend:latest

      # 4️⃣ Build & push frontend Docker image
      - name: Build & push frontend Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/week3-frontend:latest ./frontend
          docker push ghcr.io/${{ github.repository_owner }}/week3-frontend:latest

      # 5️⃣ Start stack for testing
      - name: Deploy test stack
        run: |
          docker compose up -d
          sleep 15

      # 6️⃣ Test backend service
      - name: Backend health check
        run: |
          curl --fail http://localhost:5000 || exit 1

      # 7️⃣ Test frontend service
      - name: Frontend health check
        run: |
          curl --fail http://localhost:8080 || exit 1

      # 8️⃣ Tear down
      - name: Tear down stack
        run: docker compose down --volumes
